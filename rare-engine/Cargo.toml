[package]
name = "rare-engine"
version = "0.1.0"
edition = "2021"
description = "RARE OS Core Engine - Qwen2.5-1.5B Runtime"

[dependencies]
# Inferência otimizada para CPU
candle-core = { version = "0.6.0", features = ["mkl"] }
candle-nn = "0.6.0"
candle-transformers = "0.6.0"
candle-examples = "0.6.0"

# Carregamento de modelos GGUF
gguf = "0.1.0"

# Utilitários
anyhow = "1.0"
clap = { version = "4.4", features = ["derive"] }
tokenizers = "0.15.0"

# Async mínimo (para futuras ferramentas)
tokio = { version = "1.34", features = ["rt"] }

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
panic = "abort"
strip = true
