[package]
name = "rare-engine"
version = "0.1.0"
edition = "2021"

[dependencies]
candle-core = { version = "0.6.0", default-features = false }
anyhow = "1.0"
clap = { version = "4.4", features = ["derive"] }

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
panic = "abort"
strip = true
