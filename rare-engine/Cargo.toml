[package]
name = "rare-engine"
version = "0.1.0"
edition = "2021"
description = "RARE OS Core Engine - GGUF Loader via Candle"

[dependencies]
# Candle sem BLAS/MKL/CUDA/OpenMP — apenas CPU puro
# A feature "cpu" não existe; default-features=false é suficiente
candle-core = { version = "0.6.0", default-features = false }
# candle-nn removido — não usado no loader mínimo

# Utilitários
anyhow = "1.0"
clap = { version = "4.4", features = ["derive"] }

[profile.release]
opt-level = "z"
lto = true
codegen-units = 1
panic = "abort"
strip = true
