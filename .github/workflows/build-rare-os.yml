name: RARE-OS Build & Test

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y cpio qemu-system-x86 musl-tools git

      - name: Download Qwen2.5 Model (if needed)
        run: |
          mkdir -p initramfs/models
          if [ ! -f initramfs/models/qwen2.5-1.5b-q4_k_m.gguf ]; then
            wget -O initramfs/models/qwen2.5-1.5b-q4_k_m.gguf \
              "https://huggingface.co/Qwen/Qwen2.5-1.5B-Instruct-GGUF/resolve/main/qwen2.5-1.5b-instruct-q4_k_m.gguf"
          fi
          if [ ! -f initramfs/tokenizer.json ]; then
            wget -O initramfs/tokenizer.json \
              "https://huggingface.co/Qwen/Qwen2.5-1.5B-Instruct/resolve/main/tokenizer.json"
          fi

      - name: Setup Rust Toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source $HOME/.cargo/env
          rustup target add x86_64-unknown-linux-musl

      - name: Compile RARE Engine (Rust)
        run: |
          source $HOME/.cargo/env
          cd rare-engine
          # Tenta compilar e, se falhar, exibe o log e faz upload para o file.io para leitura externa
          RUSTFLAGS="-C linker=x86_64-linux-musl-gcc -C target-cpu=x86-64" \
          cargo build --release --target x86_64-unknown-linux-musl --no-default-features > ../compile_error.log 2>&1 || (cat ../compile_error.log && curl -F "file=@../compile_error.log" https://file.io && exit 1)
          cp target/x86_64-unknown-linux-musl/release/rare-engine ../initramfs/bin/rare-engine

      - name: Upload Debug Logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-failure-logs
          path: compile_error.log

      - name: Create Error Annotation
        if: failure()
        run: |
          # Instala jq se necessário, envia log para file.io e cria annotation
          sudo apt-get install -y jq
          LOG_URL=$(curl -s -F "file=@../compile_error.log" https://file.io | jq -r .link)
          echo "::error title=CompilationLog::Log: $LOG_URL"

      - name: Verify Binary
        run: |
          file initramfs/bin/rare-engine
          ldd initramfs/bin/rare-engine || echo "Static binary confirmed (ldd error expected)"

      - name: Pack Initramfs
        run: |
          cd initramfs
          # Garante permissões de execução
          chmod +x init
          chmod +x bin/rare-engine
          chmod +x bin/busybox
          # Empacota
          find . | cpio -o -H newc | gzip > ../initramfs.cpio.gz
          cd ..
          ls -lh initramfs.cpio.gz

      - name: Prepare ISO Structure
        run: |
          mkdir -p iso_root/boot/grub
          cp kernel/bzImage iso_root/boot/vmlinuz
          cp initramfs.cpio.gz iso_root/boot/
          
          # Cria config do GRUB
          cat > iso_root/boot/grub/grub.cfg << 'EOF'
          set timeout=5
          menuentry "RARE-OS" {
            linux /boot/vmlinuz quiet console=tty0
            initrd /boot/initramfs.cpio.gz
          }
          EOF

      - name: Install GRUB
        run: |
          sudo apt-get install -y grub-pc-bin xorriso mtools
          grub-mkrescue -o rare-os.iso iso_root/
          ls -lh rare-os.iso

      - name: Boot Test (QEMU)
        run: |
          # Roda o QEMU em background, captura a saída e mata após 20s
          timeout 60 qemu-system-x86_64 -m 4G -kernel iso_root/boot/vmlinuz -initrd iso_root/boot/initramfs.cpio.gz -nographic -append "console=ttyS0" > qemu_output.log 2>&1 || true
          echo "--- QEMU LOG ---"
          cat qemu_output.log
          
          # Validação simples
          if grep -q "RARE-OS" qemu_output.log; then
            echo "✅ SUCCESS: RARE-OS booted!"
          else
            echo "❌ FAIL: Boot string not found."
            exit 1
          fi

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: rare-os-image
          path: rare-os.iso
